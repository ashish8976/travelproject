{% extends "header.html" %}
{% block container %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">
                <h4>{{ tour.title }}</h4>
                <p class="text-muted">₹{{ tour.price_per_person }} per person</p>
                <hr>
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Tour Date</label>
                        <input type="date" name="tour_date" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Persons</label>
                        <input type="number" name="quantity" class="form-control"
                               min="{{ tour.min_persons }}"
                               max="{{ tour.max_persons }}"
                               value="1" required>
                    </div>

                    <button type="submit" class="btn btn-warning w-100">
                        🛒 Add to Cart
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
