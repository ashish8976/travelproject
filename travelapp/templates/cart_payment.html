{% extends "header.html" %}
{% block container %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4 text-center">
                <h4>Order Summary</h4>
                <hr>
                {% for item in cart_items %}
                <div class="d-flex justify-content-between">
                    <span>{{ item.tour.title }} × {{ item.tour_quantity }}</span>
                    <span>₹{{ item.total_price }}</span>
                </div>
                {% endfor %}
                <hr>
                <h5 class="text-success">Total: ₹{{ grand_total }}</h5>

                <button id="pay-btn" class="btn btn-success btn-lg w-100 mt-3">
                    💳 Pay ₹{{ grand_total }}
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    document.getElementById('pay-btn').onclick = function() {
        var options = {
            "key": "{{ razorpay_key }}",
            "amount": "{{ grand_total }}00",
            "currency": "INR",
            "name": "Travel Booking",
            "description": "Cart Checkout",
            "order_id": "{{ razorpay_order_id }}",

            "handler": function(response) {
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = "{% url 'cart_payment_success' %}";

                var csrf = document.createElement('input');
                csrf.type = 'hidden';
                csrf.name = 'csrfmiddlewaretoken';
                csrf.value = '{{ csrf_token }}';
                form.appendChild(csrf);

                ['razorpay_payment_id', 'razorpay_order_id', 'razorpay_signature'].forEach(function(key) {
                    var input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = response[key];
                    form.appendChild(input);
                });

                document.body.appendChild(form);
                form.submit();
            },

            "prefill": {
                "name": "{{ user.fname }} {{ user.lname }}",
                "email": "{{ user.email }}",
                "contact": "{{ user.mobile_number }}"
            },

            "theme": { "color": "#198754" }
        };

        var rzp = new Razorpay(options);
        rzp.open();
    };
</script>
{% endblock %}
